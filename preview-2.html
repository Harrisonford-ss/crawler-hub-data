<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview 2 · Editorial Cream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,300;1,9..144,400;1,9..144,800&family=Noto+Serif+SC:wght@300;400;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --paper:#f5ede0;
  --paper-warm:#ede2d0;
  --ink:#1a1612;
  --ink-soft:#4a3f32;
  --ink-dim:#8a7e6c;
  --red:#c4352d;
  --gold:#c79a3d;
  --rule:#ccb79a;
  --serif:"Fraunces","Noto Serif SC",serif;
  --mono:"JetBrains Mono",monospace;
}
html,body{background:var(--paper);color:var(--ink);font-family:var(--serif);min-height:100vh;font-feature-settings:"ss01","salt"}
body{
  background-image:
    repeating-linear-gradient(90deg, transparent 0 calc(100% / 12 - 1px), rgba(139,110,70,0.035) calc(100% / 12 - 1px) calc(100% / 12));
}

a{color:var(--ink);text-decoration:none}
a:hover{color:var(--red)}

.head{
  border-bottom:2px solid var(--ink);padding:28px 48px 14px;
  display:flex;align-items:baseline;justify-content:space-between;
  font-family:var(--mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-soft);
}
.mast{font-family:var(--serif);font-weight:900;font-size:34px;letter-spacing:-0.02em;color:var(--ink);text-transform:none;letter-spacing:-0.025em}
.mast em{font-style:italic;color:var(--red);font-weight:300}

.wrap{max-width:1120px;margin:0 auto;padding:0 48px 80px}

.issue{
  margin:40px 0 60px;display:flex;justify-content:space-between;align-items:baseline;
  border-bottom:1px solid var(--rule);padding-bottom:18px;
  font-family:var(--mono);font-size:10px;letter-spacing:0.2em;color:var(--ink-dim);text-transform:uppercase;
}
.issue .vol b{color:var(--red)}

.lede{
  padding:80px 0 60px;border-bottom:3px double var(--rule);margin-bottom:60px;
  max-width:860px;
}
.lede .cat{
  font-family:var(--mono);font-size:11px;letter-spacing:0.3em;color:var(--red);text-transform:uppercase;margin-bottom:20px;
}
.lede h1{
  font-family:var(--serif);font-weight:300;
  font-size:clamp(56px,9vw,124px);line-height:0.95;letter-spacing:-0.035em;color:var(--ink);
  margin-bottom:32px;
  font-variation-settings:"opsz" 144, "SOFT" 0;
}
.lede h1 em{
  font-style:italic;font-weight:800;color:var(--red);
  font-variation-settings:"opsz" 144, "SOFT" 100;
}
.lede .deck{
  font-family:var(--serif);font-style:italic;font-weight:300;
  font-size:22px;line-height:1.55;color:var(--ink-soft);
  max-width:660px;
}
.lede .byline{
  margin-top:40px;font-family:var(--mono);font-size:10px;letter-spacing:0.25em;
  color:var(--ink-dim);text-transform:uppercase;
}

/* 5-column asymmetric grid for articles */
.columns{
  display:grid;grid-template-columns:1fr 1fr;gap:56px 80px;
  padding:20px 0;
}

.article{
  padding:40px 0;position:relative;
  border-bottom:1px solid var(--rule);
}
.article:nth-child(odd){padding-top:0;border-top:none}
.article .pilcrow{
  position:absolute;left:-40px;top:40px;
  font-family:var(--serif);font-weight:800;font-size:120px;line-height:0.8;color:var(--red);
  font-style:italic;opacity:0.25;user-select:none;
}
.article-cat{
  font-family:var(--mono);font-size:10px;letter-spacing:0.25em;color:var(--red);text-transform:uppercase;
  margin-bottom:14px;
}
.article h3{
  font-family:var(--serif);font-weight:400;font-size:34px;line-height:1.15;
  letter-spacing:-0.02em;color:var(--ink);margin-bottom:16px;
  font-variation-settings:"opsz" 144;
}
.article h3 a{color:var(--ink);background:linear-gradient(transparent 75%,rgba(196,53,45,0.2) 75%);background-size:0 100%;background-repeat:no-repeat;transition:background-size 0.5s}
.article h3 a:hover{background-size:100% 100%}
.article .byline{
  font-family:var(--mono);font-size:10px;letter-spacing:0.2em;color:var(--ink-dim);
  text-transform:uppercase;display:flex;gap:24px;margin-bottom:18px;
}
.article .byline .n{color:var(--red);font-weight:500}
.article p{
  font-family:var(--serif);font-size:15.5px;line-height:1.7;color:var(--ink-soft);
  margin-bottom:14px;
}
.article p.lead{
  font-size:17px;font-style:italic;color:var(--ink);
}
.article p.lead::first-letter{
  font-family:var(--serif);font-weight:800;font-size:72px;line-height:0.85;
  float:left;margin:4px 10px -4px 0;color:var(--red);font-style:normal;
  font-variation-settings:"opsz" 144;
}
.article .tags{
  font-family:var(--mono);font-size:10px;letter-spacing:0.15em;color:var(--ink-dim);
  text-transform:uppercase;margin-top:14px;
}
.article .tags span{margin-right:16px}
.article .rating{
  position:absolute;top:40px;right:0;
  display:flex;flex-direction:column;align-items:center;
  font-family:var(--serif);
}
.article .rating-n{
  font-size:44px;font-weight:300;line-height:1;color:var(--red);
  font-style:italic;
  font-variation-settings:"opsz" 144,"SOFT" 100;
}
.article .rating-l{
  font-family:var(--mono);font-size:9px;letter-spacing:0.2em;color:var(--ink-dim);
  text-transform:uppercase;margin-top:4px;
}

.page-footer{
  margin-top:80px;border-top:2px solid var(--ink);padding:24px 0;
  display:flex;justify-content:space-between;
  font-family:var(--mono);font-size:10px;letter-spacing:0.2em;color:var(--ink-dim);text-transform:uppercase;
}

@keyframes slideup{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.article{animation:slideup 0.8s cubic-bezier(0.2,0.9,0.3,1) both}
.article:nth-child(2){animation-delay:0.1s}
.article:nth-child(3){animation-delay:0.2s}
.article:nth-child(4){animation-delay:0.3s}
.article:nth-child(5){animation-delay:0.4s}

@media(max-width:720px){
  .wrap{padding:0 24px 60px}
  .head{padding:20px 24px 12px}
  .columns{grid-template-columns:1fr;gap:0}
  .lede h1{font-size:48px}
  .article .pilcrow{display:none}
  .article .rating{position:static;flex-direction:row;gap:12px;margin-bottom:14px}
}
</style>
</head>
<body>

<header class="head">
  <div class="mast">crawler<em>·</em>hub</div>
  <div>WEEKLY BRIEFING · ISSUE <b id="issnum">——</b></div>
</header>

<main class="wrap">
  <div class="issue">
    <div class="vol">VOL. I · NO. <b id="issnum2">—</b> · <span id="issdate">——</span></div>
    <div>视频专栏 · FILMS — <a href="tools.html" style="color:var(--red)">工具专栏 →</a></div>
  </div>

  <article class="lede">
    <div class="cat">WEEK IN REVIEW</div>
    <h1>what the <em>algorithms</em><br/>are watching now.</h1>
    <p class="deck" id="summary">loading…</p>
    <div class="byline">COMPILED BY CRAWLER-HUB · VERIFIED BY DOUBAO · <span id="isstime"></span></div>
  </article>

  <section class="columns" id="columns"></section>

  <div class="page-footer">
    <div>— CRAWLER·HUB QUARTERLY —</div>
    <div><a href="tools.html" style="color:var(--red)">→ The Tools Section</a></div>
  </div>

</main>

<script>
function esc(s){return String(s??'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]))}
function fmt(n){n=Number(n)||0;if(n>=1e8)return(n/1e8).toFixed(1)+'亿';if(n>=1e4)return(n/1e4).toFixed(1)+'万';return n.toLocaleString()}

fetch('data/latest.json?_='+Date.now()).then(r=>r.json()).then(d=>{
  const issue = (d.week||'').split('-W')[1] || '--';
  document.getElementById('issnum').textContent = issue;
  document.getElementById('issnum2').textContent = issue;
  document.getElementById('issdate').textContent = (d.generated_at||'').slice(0,10);
  document.getElementById('isstime').textContent = (d.generated_at||'').slice(0,10);
  document.getElementById('summary').textContent = d.summary || '';
  const vids = (d.videos||[]).slice(0,5);
  document.getElementById('columns').innerHTML = vids.map((v,i)=>{
    const tags = (v.style_tags||[]).map(t=>`<span>${esc(t)}</span>`).join('');
    return `<article class="article">
      <div class="pilcrow">¶</div>
      <div class="article-cat">${esc((v.platform||'').replace('_shorts',''))} · Entry №${String(i+1).padStart(2,'0')}</div>
      <h3><a href="${esc(v.url)}" target="_blank">${esc(v.title||'(untitled)')}</a></h3>
      <div class="byline">
        <span>By ${esc(v.author||'unknown')}</span>
        <span class="n">${fmt(v.plays)} plays</span>
        <span>${fmt(v.likes)} likes</span>
        ${v.duration_sec?`<span>${v.duration_sec}s</span>`:''}
      </div>
      ${v.hook?`<p class="lead">${esc(v.hook)}</p>`:''}
      ${v.structure?`<p>结构 — ${esc(v.structure)}</p>`:''}
      ${tags?`<div class="tags">${tags}</div>`:''}
      <div class="rating">
        <div class="rating-n">${Number(v.score||0).toFixed(1)}</div>
        <div class="rating-l">/ 10 Doubao</div>
      </div>
    </article>`;
  }).join('');
});
</script>
</body>
</html>
