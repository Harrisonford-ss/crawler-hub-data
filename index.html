<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>资讯 · AI 短剧情报</title>
  <meta name="description" content="每周精选 AI 短视频爆款，豆包拆解钩子/节奏/风格" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="brand">短剧<em>·</em>情报系统</a>
      <div class="nav-tabs">
        <a href="index.html" class="active">📺 资讯</a>
        <a href="tools.html">🛠 学习</a>
      </div>
      <div class="nav-meta">
        <div><b id="nav-week">——</b> · 每周一更新</div>
        <div id="nav-updated"></div>
      </div>
    </div>
  </nav>

  <main class="wrap">
    <section class="hero">
      <div class="hero-label">Weekly Briefing · 情报简报</div>
      <h1>本周 <em>爆款</em> 短视频<br />哪些 <em>钩子</em> 值得学</h1>
      <p class="hero-summary" id="summary">加载中…</p>
      <div class="hero-stats" id="hero-stats"></div>
    </section>

    <section id="platforms"><div class="loading">loading…</div></section>

    <footer class="footer">
      <div>短剧·情报系统 · powered by 豆包</div>
      <div><a href="tools.html">→ 学习板块</a></div>
    </footer>
  </main>

  <script src="app.js"></script>
  <script>
    function renderVideo(v, i) {
      const plat = esc(v.platform || "");
      const cover = v.cover_url
        ? `<a href="${esc(v.url)}" target="_blank" rel="noopener"><div class="cover" style="background-image:url('${esc(v.cover_url)}')"><span class="cover-badge ${plat}">${plat.replace("_shorts","")}</span></div></a>`
        : `<div class="cover"><span class="cover-badge ${plat}">${plat.replace("_shorts","")}</span></div>`;
      const tags = (v.style_tags || []).map(t => `<span class="chip">${esc(t)}</span>`).join("");
      const score = Number(v.score || 0);
      const scorePct = Math.min(100, score * 10);
      return `<article class="vcard reveal">
        <div class="num">${String(i+1).padStart(2, "0")}</div>
        ${cover}
        <div class="vcard-body">
          <h3 class="vcard-title"><a href="${esc(v.url)}" target="_blank" rel="noopener">${esc(v.title || "(无标题)")}</a></h3>
          <div class="vcard-meta">
            <span class="author">${esc(v.author || "?")}</span>
            <span class="num-mono">▶ ${fmtNumber(v.plays)}</span>
            <span class="num-mono">♥ ${fmtNumber(v.likes)}</span>
            ${v.duration_sec ? `<span class="num-mono">⏱ ${v.duration_sec}s</span>` : ""}
          </div>
          ${v.hook ? `<div class="vcard-hook">&ldquo;${esc(v.hook)}&rdquo;</div>` : ""}
          ${v.structure ? `<div class="vcard-structure"><b>结构</b>${esc(v.structure)}</div>` : ""}
          ${tags ? `<div class="vcard-tags">${tags}</div>` : ""}
        </div>
        <div class="score-badge">
          <div class="score-n">${score.toFixed(1)}</div>
          <div class="score-l">豆包</div>
          <div class="score-bar"><span style="width:${scorePct}%"></span></div>
        </div>
      </article>`;
    }

    const PLATFORM_LABEL = {
      douyin: { name: "抖音", emoji: "🔴", order: 1 },
      bilibili_video: { name: "B 站", emoji: "🔵", order: 2 },
      youtube_shorts: { name: "YouTube Shorts", emoji: "🟡", order: 3 },
      tiktok: { name: "TikTok", emoji: "⚫", order: 4 },
      xiaohongshu: { name: "小红书", emoji: "🟥", order: 5 },
      kuaishou: { name: "快手", emoji: "🟠", order: 6 },
    };

    function groupByPlatform(videos) {
      const buckets = {};
      for (const v of videos) {
        const p = v.platform || "other";
        if (!buckets[p]) buckets[p] = [];
        buckets[p].push(v);
      }
      return Object.entries(buckets)
        .map(([p, items]) => ({
          platform: p,
          meta: PLATFORM_LABEL[p] || { name: p, emoji: "📺", order: 99 },
          items: items.slice().sort((a, b) => {
            const sa = (a.score || 0) * Math.log10(Math.max(10, a.plays || 10));
            const sb = (b.score || 0) * Math.log10(Math.max(10, b.plays || 10));
            return sb - sa;
          }),
        }))
        .sort((a, b) => a.meta.order - b.meta.order);
    }

    async function init() {
      try {
        const d = await loadData();
        setupNav(d.week, `更新于 ${fmtDate(d.generated_at)}`);
        const videos = d.videos || [];
        document.getElementById("summary").textContent = d.summary || "本周数据待生成。";

        const totalPlays = videos.reduce((s, v) => s + (v.plays || 0), 0);
        const avgScore = videos.length ? (videos.reduce((s, v) => s + (v.score || 0), 0) / videos.length) : 0;
        const platformCount = new Set(videos.map(v => v.platform)).size;
        document.getElementById("hero-stats").innerHTML = `
          <div class="hero-stat"><div class="hero-stat-n">${videos.length}</div><div class="hero-stat-l">入选视频</div></div>
          <div class="hero-stat"><div class="hero-stat-n">${platformCount}</div><div class="hero-stat-l">数据源</div></div>
          <div class="hero-stat"><div class="hero-stat-n">${fmtNumber(totalPlays)}</div><div class="hero-stat-l">累计播放</div></div>
          <div class="hero-stat"><div class="hero-stat-n">${avgScore.toFixed(1)}</div><div class="hero-stat-l">平均豆包分</div></div>
        `;

        const groups = groupByPlatform(videos);
        const html = groups.length
          ? groups.map(g => `
            <div class="stage-group">
              <div class="section-head">
                <h2>${g.meta.emoji}&nbsp; ${esc(g.meta.name)}</h2>
                <span class="tag">${g.items.length} 条 · 按 豆包分 × log(播放) 排序</span>
              </div>
              <div class="vlist">${g.items.map((v, i) => renderVideo(v, i)).join("")}</div>
            </div>`).join("")
          : `<div class="empty">本周尚无视频数据</div>`;
        document.getElementById("platforms").innerHTML = html;
        observeReveal();
      } catch (e) {
        document.getElementById("summary").innerHTML =
          `<span class="error">数据加载失败：${esc(e.message)}。首次数据将在周一 08:00 生成。</span>`;
        document.getElementById("platforms").innerHTML = "";
      }
    }
    init();
  </script>
</body>
</html>
